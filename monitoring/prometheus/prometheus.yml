global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: 'syncplay-spring'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['spring:8080']
        labels:
          application: syncplay-spring

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
