# Reverse proxy for the SyncPlay stack.
#
# Single public entry point on port 80:
#   /ws/*     → syncplay-sync   (WebSocket upgrade)
#   /api/*    → syncplay-spring (REST)
#   everything else → syncplay-next (Next.js app, static + SSR)
#
# Putting WS on the same origin/port as the page solves two real problems:
#   1. iOS Safari refuses ws:// when the page is https:// (mixed content).
#      Terminate TLS here and proxy WS over the same connection.
#   2. Mobile carriers and macOS firewall sometimes block non-standard ports
#      like 3002 outright. 80/443 always pass.

user  nginx;
worker_processes  auto;

events { worker_connections 1024; }

http {
  # Connection: Upgrade is required for the WebSocket handshake to pass through.
  # NGINX strips hop-by-hop headers by default; this map restores Upgrade when present.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Long-running uploads / range streams. Keep buffers high; relax timeouts so a
  # paused but open WebSocket isn't killed by NGINX while clients are quiet.
  client_max_body_size 200m;
  proxy_read_timeout   3600s;
  proxy_send_timeout   3600s;
  proxy_buffering      off;

  # Используем host.docker.internal, чтобы конфиг работал в обоих режимах:
  #   • dev: next/sync/spring запущены нативно через ./restart.sh, nginx в
  #     докере достучится до них через host;
  #   • full-docker: все сервисы в compose, порты 3000/3002/8080 опубликованы
  #     на хост — host.docker.internal по-прежнему резолвится.
  # На Linux-хостах эта DNS-запись не создаётся автоматически; см. extra_hosts
  # в docker-compose.yml для сервиса nginx (туда добавлен host-gateway).
  upstream syncplay_next   { server host.docker.internal:3000; }
  upstream syncplay_sync   { server host.docker.internal:3002; }
  upstream syncplay_spring { server host.docker.internal:8080; }

  log_format combined_upstream '$remote_addr - $remote_user [$time_local] '
                               '"$request" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent" '
                               'upstream=$upstream_addr time=${upstream_response_time}s';
  access_log /var/log/nginx/access.log combined_upstream;

  server {
    listen 80;
    server_name _;

    # WebSocket: the path syncplay-sync expects is /ws/room/{id}?token=...
    # No rewrite — pass URI through as-is.
    location /ws/ {
      proxy_pass http://syncplay_sync;
      proxy_http_version 1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host       $host;
      proxy_set_header X-Real-IP  $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # WebSocket-specific: disable buffering and let frames flow as they arrive.
      proxy_buffering off;
      proxy_cache off;
      # No idle timeout — a passive listener may not send anything for minutes
      # between PING (every 4s) and the audio events. Keep alive aggressively.
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # REST API: go directly to Spring rather than through Next.js. Saves one hop
    # and avoids the Next.js rewrite layer (which would re-encode bodies/headers).
    location /api/ {
      proxy_pass http://syncplay_spring;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Range requests for /api/stream/{id} must pass through. NGINX forwards
      # Range headers by default; we also keep responses unbuffered so the
      # browser starts decoding before the file is fully proxied.
      proxy_buffering off;
    }

    # Everything else — the Next.js application.
    location / {
      proxy_pass http://syncplay_next;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # Next.js may itself open WS connections for HMR in dev; harmless in prod
      # (the headers are no-ops without an actual upgrade request).
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
