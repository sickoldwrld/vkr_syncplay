services:
  postgres:
    image: postgres:16-alpine
    container_name: syncplay-postgres-fixed
    environment:
      POSTGRES_DB: music_streaming
      POSTGRES_USER: musicapp
      POSTGRES_PASSWORD: secret123
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicapp -d music_streaming"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: syncplay-minio-fixed
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      retries: 5

  spring:
    build:
      context: ./syncplay-spring
      dockerfile: Dockerfile
    container_name: syncplay-spring
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/music_streaming
      DB_USER: musicapp
      DB_PASSWORD: secret123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: syncplay-tracks
      CORS_ORIGINS: http://localhost:3000
      INTERNAL_SECRET: syncplay-internal-secret
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  sync:
    build:
      context: ./syncplay-sync
      dockerfile: Dockerfile
    container_name: syncplay-sync
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      SPRING_URL: http://spring:8080
      INTERNAL_SECRET: syncplay-internal-secret
    depends_on:
      - spring
    restart: unless-stopped

  next:
    build:
      context: ./syncplay-next
      dockerfile: Dockerfile
      args:
        API_URL: http://spring:8080
    container_name: syncplay-next
    ports:
      - "3000:3000"
    environment:
      API_URL: http://spring:8080
    depends_on:
      - spring
      - sync
    restart: unless-stopped

  # Reverse proxy. Single public entry on :80 fronting next / sync / spring.
  # Eliminates direct exposure of :3000 / :3002 / :8080 and solves iOS Safari
  # mixed-content issues by allowing WS on the same origin as the page.
  # See nginx/nginx.conf for routing rules.
  #
  # Upstreams resolve through host.docker.internal — works whether the apps are
  # native (./restart.sh, current dev workflow) or containerised. extra_hosts
  # adds the Linux-side mapping; macOS already resolves it natively.
  # No depends_on: nginx starts immediately and retries upstream on demand.
  nginx:
    image: nginx:1.27-alpine
    container_name: syncplay-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: syncplay-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - spring

  grafana:
    image: grafana/grafana:latest
    container_name: syncplay-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  pg-data:
  minio-data:
  prometheus-data:
  grafana-data:
